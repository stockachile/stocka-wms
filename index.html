<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - WMS STOCKA</title>
  <meta name="description" content="Acceso a la plataforma de gestión de inventario WMS STOCKA">
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="apple-touch-icon" href="./favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/theme.js"></script>
</head>
<body>

  <button class="theme-toggle-btn floating-theme-toggle" aria-label="Cambiar tema">
    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
  </button>  <main class="auth-wrapper">
    <div class="auth-split-container">
      <div class="auth-card">
        <div class="auth-logo">
          <img src="https://cdn.shopify.com/s/files/1/0625/6141/9483/files/newlogotransp.png?v=1779852093" alt="STOCKA Logo" class="light-logo">
          <img src="https://cdn.shopify.com/s/files/1/0625/6141/9483/files/Stocka_1300_x_500_px_519_x_200_px_5.png?v=1779650350" alt="STOCKA Logo" class="dark-logo">
        </div>
      
      <h1 class="auth-title">Bienvenido</h1>
      <p class="auth-subtitle">Ingresa tus credenciales para acceder a tu bodega online.</p>

      <div id="alert-container"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input type="email" id="email" class="form-input" placeholder="ejemplo@empresa.com" required>
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="login-btn">
          Ingresar
        </button>

        <p style="text-align: right; margin-top: 0.75rem;">
          <a href="#" id="toggle-to-forgot" style="color: var(--color-accent); font-weight: 500; font-size: 0.85rem; text-decoration: none;">¿Olvidaste tu contraseña?</a>
        </p>

        <div style="display: flex; align-items: center; justify-content: center; margin: 1.25rem 0; gap: 0.75rem;">
          <div style="flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--color-border), transparent);"></div>
          <span style="font-size: 0.7rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">¿Eres nuevo?</span>
          <div style="flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--color-border), transparent);"></div>
        </div>

        <div style="background: linear-gradient(135deg, rgba(94, 23, 235, 0.08) 0%, rgba(37, 99, 235, 0.03) 100%); border: 1px dashed rgba(94, 23, 235, 0.35); border-radius: var(--radius-md); padding: 0.85rem 1rem; text-align: center; margin-bottom: 1.25rem; transition: all 0.2s; position: relative; overflow: hidden;">
          <div style="font-size: 0.8rem; color: var(--color-text-muted); margin-bottom: 0.35rem; font-weight: 500;">¿Quieres operar con nosotros?</div>
          <a href="./onboarding.html" id="go-to-onboarding" style="color: var(--color-accent); font-weight: 700; text-decoration: none; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 0.25rem; transition: transform 0.2s;" onmouseover="this.style.transform='translateX(2px)'" onmouseout="this.style.transform='none'">
            <i class="ri-rocket-2-line" style="font-size: 1rem;"></i> Solicitar Alta de Comercio <i class="ri-arrow-right-line" style="font-size: 0.8rem;"></i>
          </a>
        </div>

        <p class="auth-toggle-text" style="text-align: center; font-size: 0.825rem; color: var(--color-text-muted); margin: 0;">
          ¿No tienes una cuenta? <a href="#" id="toggle-to-register" style="color: var(--color-accent); font-weight: 600; text-decoration: none; border-bottom: 1px solid transparent; padding-bottom: 1px;" onmouseover="this.style.borderBottomColor='var(--color-accent)'" onmouseout="this.style.borderBottomColor='transparent'">Regístrate aquí</a>
        </p>
      </form>

      <!-- Formulario de Registro (Oculto por defecto) -->
      <form id="register-form" style="display: none;">
        <div class="form-group">
          <label for="reg-name" class="form-label">Nombre Completo</label>
          <input type="text" id="reg-name" class="form-input" placeholder="Juan Pérez" required>
        </div>

        <div class="form-group">
          <label for="reg-company" class="form-label">Nombre de la Empresa</label>
          <input type="text" id="reg-company" class="form-input" placeholder="Mi Empresa S.A." required>
        </div>

        <div class="form-group">
          <label for="reg-email" class="form-label">Correo Electrónico</label>
          <input type="email" id="reg-email" class="form-input" placeholder="ejemplo@empresa.com" required>
        </div>
        
        <div class="form-group">
          <label for="reg-password" class="form-label">Contraseña</label>
          <input type="password" id="reg-password" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="register-btn">
          Crear Cuenta
        </button>

        <p class="auth-toggle-text" style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--color-text-muted);">
          ¿Ya tienes una cuenta? <a href="#" id="toggle-to-login" style="color: var(--color-accent); font-weight: 600;">Inicia sesión aquí</a>
        </p>
      </form>

      <!-- Formulario de Recuperar Contraseña (Oculto por defecto) -->
      <form id="forgot-form" style="display: none;">
        <div class="form-group">
          <label for="forgot-email" class="form-label">Correo Electrónico</label>
          <input type="email" id="forgot-email" class="form-input" placeholder="ejemplo@empresa.com" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="forgot-btn">
          Enviar enlace de recuperación
        </button>

        <p class="auth-toggle-text" style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--color-text-muted);">
          <a href="#" id="toggle-to-login-from-forgot" style="color: var(--color-accent); font-weight: 600;">← Volver al inicio de sesión</a>
        </p>
      </form>
    </div>
    <div class="auth-image-card">
      <img src="https://cdn.shopify.com/s/files/1/0625/6141/9483/files/Diseno_sin_titulo_72.png?v=1781744518" alt="WMS STOCKA Portada">
    </div>
  </div>
  </main>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- App Scripts -->
  <script type="module" src="./js/supabase.js"></script>
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
